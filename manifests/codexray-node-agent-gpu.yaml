apiVersion: v1
kind: Namespace
metadata:
  name: codexray-agents

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: codexray-cluster-agent
  namespace: codexray-agents

---
# ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: codexray-cluster-agent
rules:
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - services
      - endpoints
      - namespaces
      - configmaps
      - secrets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources:
      - nodes/proxy
      - nodes/stats
      - nodes/metrics
    verbs: ["get"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: codexray-cluster-agent
subjects:
  - kind: ServiceAccount
    name: codexray-cluster-agent
    namespace: codexray-agents
roleRef:
  kind: ClusterRole
  name: codexray-cluster-agent
  apiGroup: rbac.authorization.k8s.io

---
# =========================
# Node Agent (DaemonSet) - WITH GPU Support
# =========================
# Use this manifest if your cluster has NVIDIA GPUs
# Make sure to build the Docker image with BUILD_GPU=true
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: codexray-node-agent
  namespace: codexray-agents
spec:
  selector:
    matchLabels:
      app: codexray-node-agent
  template:
    metadata:
      labels:
        app: codexray-node-agent
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: codexray-node-agent
          image: ghcr.io/codifinary/codexray-node-agent:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/bin/codexray-node-agent
          args:
            - --listen=:10300
            - --collector-endpoint=http://YOUR_CODEXRAY_IP:8080
            - --cgroupfs-root=/host/sys/fs/cgroup
            - --wal-dir=/data
          env:
            # Set LD_LIBRARY_PATH to find NVIDIA libraries from host
            - name: LD_LIBRARY_PATH
              value: /host/usr/lib/x86_64-linux-gnu:/host/usr/lib64:/host/usr/local/cuda/lib64:/host/run/nvidia/driver/usr/lib/x86_64-linux-gnu:/host/run/nvidia/driver/usr/lib64:/usr/lib/x86_64-linux-gnu:/usr/lib64
          securityContext:
            privileged: true
            runAsUser: 0
          ports:
            - containerPort: 10300
              hostPort: 10300
              protocol: TCP
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              readOnly: true
            - name: tracing
              mountPath: /sys/kernel/tracing
            - name: debug
              mountPath: /sys/kernel/debug
            - name: cgroup
              mountPath: /host/sys/fs/cgroup
              readOnly: true
            - name: data
              mountPath: /data
            # Mount NVIDIA libraries from host (required for GPU support)
            - name: nvidia-lib-x86
              mountPath: /host/usr/lib/x86_64-linux-gnu
              readOnly: true
            - name: nvidia-lib64
              mountPath: /host/usr/lib64
              readOnly: true
            - name: nvidia-cuda
              mountPath: /host/usr/local/cuda
              readOnly: true
            - name: nvidia-driver-run
              mountPath: /host/run/nvidia/driver
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
        - name: tracing
          hostPath:
            path: /sys/kernel/tracing
        - name: debug
          hostPath:
            path: /sys/kernel/debug
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: data
          emptyDir: {}
        # NVIDIA library mounts from host (required for GPU support)
        - name: nvidia-lib-x86
          hostPath:
            path: /usr/lib/x86_64-linux-gnu
            type: Directory
        - name: nvidia-lib64
          hostPath:
            path: /usr/lib64
            type: Directory
        - name: nvidia-cuda
          hostPath:
            path: /usr/local/cuda
            type: Directory
        - name: nvidia-driver-run
          hostPath:
            path: /run/nvidia/driver
            type: Directory

---
# Node Agent Service (optional)
apiVersion: v1
kind: Service
metadata:
  name: codexray-node-agent
  namespace: codexray-agents
spec:
  selector:
    app: codexray-node-agent
  ports:
    - name: metrics
      port: 10300
      targetPort: 10300
  type: ClusterIP
