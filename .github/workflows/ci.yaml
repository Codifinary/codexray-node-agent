name: CI - Build, Test, Lint
# -------------------------------------
# Triggers: Run on pull requests to any branch
# -------------------------------------
on:
  pull_request:
    branches:
      - '*'  # Any branch
# -------------------------------------
# Environment Variables (from GitHub Settings → Secrets and variables → Actions → Variables)
# Required vars: GO_VERSION, BINARY_NAME
# -------------------------------------
env:
  GO_VERSION: ${{ vars.GO_VERSION }}
  BINARY_NAME: ${{ vars.BINARY_NAME }}
permissions:
  contents: read
  pull-requests: write  # For PR comments if needed
# -------------------------------------
# Job: CI - Build, Test, Lint
# -------------------------------------
jobs:
  build:
    name: Build, Test, Lint
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Set up Go environment
      - name: Set up Go
        id: setup_go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ env.GO_VERSION }}
        continue-on-error: true

      # Configure Git for private repositories
      - name: Configure Git for private modules
        id: configure_git
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GHCR_PAT}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git config --global url."https://x-access-token:${GHCR_PAT}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/${{ github.repository_owner }}/*
          go env -w GONOPROXY=github.com/${{ github.repository_owner }}/*
          go env -w GONOSUMDB=github.com/${{ github.repository_owner }}/*
        continue-on-error: true

      # Cache Go modules to speed up the build process
      - name: Cache Go modules
        id: cache_modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
        continue-on-error: true

      # Install Go dependencies
      - name: Install dependencies
        id: install_deps
        run: go mod download
        continue-on-error: true

      # Install systemd development headers
      - name: Install systemd development headers
        id: install_systemd
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev
        continue-on-error: true

      # Build the Go project
      - name: Build
        id: build
        run: go build -o ${{ env.BINARY_NAME }} .
        continue-on-error: true

      # Archive the built binary as an artifact
      - name: Archive production artifacts
        id: archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: ${{ env.BINARY_NAME }}
        continue-on-error: true

      # Generate workflow summary
      - name: Generate CI Summary
        if: always()
        run: |
          echo "## CI Workflow Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if all steps passed
          if [ "${{ steps.checkout.outcome }}" == "success" ] && \
             [ "${{ steps.setup_go.outcome }}" == "success" ] && \
             [ "${{ steps.configure_git.outcome }}" == "success" ] && \
             [ "${{ steps.cache_modules.outcome }}" == "success" ] && \
             [ "${{ steps.install_deps.outcome }}" == "success" ] && \
             [ "${{ steps.install_systemd.outcome }}" == "success" ] && \
             [ "${{ steps.build.outcome }}" == "success" ] && \
             [ "${{ steps.archive.outcome }}" == "success" ]; then
            echo "### ✅ CI STATUS: PASSED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All build, test, and lint steps completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ CI STATUS: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more steps failed. Please check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi