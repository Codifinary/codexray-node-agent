name: CI - Build, Test, Lint
# -------------------------------------
# Triggers: Run on pull requests to any branch
# -------------------------------------
on:
  pull_request:
    branches:
      - '*'  # Any branch
# -------------------------------------
# Environment Variables (from GitHub Settings → Secrets and variables → Actions → Variables)
# Required vars: GO_VERSION, BINARY_NAME
# -------------------------------------
env:
  GO_VERSION: ${{ vars.GO_VERSION }}
  BINARY_NAME: ${{ vars.BINARY_NAME }}
permissions:
  contents: read
  pull-requests: write  # For PR comments if needed
# -------------------------------------
# Jobs
# -------------------------------------
jobs:
  build:
    name: Build, Test, Lint
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ env.GO_VERSION }}

      # Configure Git for private repositories
      - name: Configure Git for private modules
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GHCR_PAT}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git config --global url."https://x-access-token:${GHCR_PAT}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/${{ github.repository_owner }}/*
          go env -w GONOPROXY=github.com/${{ github.repository_owner }}/*
          go env -w GONOSUMDB=github.com/${{ github.repository_owner }}/*

      # Cache Go modules to speed up the build process
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Install Go dependencies
      - name: Install dependencies
        run: go mod download

      # Install systemd development headers
      - name: Install systemd development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev

      # Build the Go project
      - name: Build
        run: go build -o ${{ env.BINARY_NAME }} .

      # Archive the built binary as an artifact
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: ${{ env.BINARY_NAME }}

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build]
    if: always()  # Run even if build job fails

    steps:
      - name: Generate CI Summary
        run: |
          echo "## 📊 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Build job status
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **Build, Test, Lint** - Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ **Build, Test, Lint** - Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Build, Test, Lint** - ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Overall Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Determine overall status
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "🎉 **All checks passed!** Ready to merge." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some checks failed or were skipped.** Please review the job logs above." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${{ github.head_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Go Version**: \`${{ env.GO_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Binary Name**: \`${{ env.BINARY_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          
          # Exit with failure if build job failed
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ CI Pipeline failed. One or more checks did not pass."
            exit 1
          fi
          
          echo "✅ All CI checks passed successfully."