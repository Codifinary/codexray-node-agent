name: CI - Build, Test, Lint
# -------------------------------------
# Triggers: Run on pull requests to any branch
# -------------------------------------
on:
  pull_request:
    branches:
      - '*'  # Any branch
# -------------------------------------
# Environment Variables (from GitHub Settings → Secrets and variables → Actions → Variables)
# Required vars: GO_VERSION, BINARY_NAME
# -------------------------------------
env:
  GO_VERSION: ${{ vars.GO_VERSION }}
  BINARY_NAME: ${{ vars.BINARY_NAME }}
permissions:
  contents: read
  pull-requests: write  # For PR comments if needed
# -------------------------------------
# Job: CI - Build, Test, Lint
# -------------------------------------
jobs:
  build:
    name: Build, Test, Lint
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Set up Go environment
      - name: Set up Go
        id: setup_go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ env.GO_VERSION }}
        continue-on-error: true

      # Configure Git for private repositories
      - name: Configure Git for private modules
        id: configure_git
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GHCR_PAT}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git config --global url."https://x-access-token:${GHCR_PAT}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/${{ github.repository_owner }}/*
          go env -w GONOPROXY=github.com/${{ github.repository_owner }}/*
          go env -w GONOSUMDB=github.com/${{ github.repository_owner }}/*
        continue-on-error: true

      # Cache Go modules to speed up the build process
      - name: Cache Go modules
        id: cache_modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
        continue-on-error: true

      # Install Go dependencies
      - name: Install dependencies
        id: install_deps
        run: go mod download
        continue-on-error: true

      # Install systemd development headers
      - name: Install systemd development headers
        id: install_systemd
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev
        continue-on-error: true

      # Build the Go project
      - name: Build
        id: build
        run: go build -o ${{ env.BINARY_NAME }} .
        continue-on-error: true

      # Archive the built binary as an artifact
      - name: Archive production artifacts
        id: archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: ${{ env.BINARY_NAME }}
        continue-on-error: true

      # Generate workflow summary
      - name: CI Summary
        if: always()
        run: |
          echo "## 📊 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Checkout status
          if [ "${{ steps.checkout.outcome }}" == "success" ]; then
            echo "✅ **Checkout Code** - Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.checkout.outcome }}" == "failure" ]; then
            echo "❌ **Checkout Code** - Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Checkout Code** - ${{ steps.checkout.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Set up Go status
          if [ "${{ steps.setup_go.outcome }}" == "success" ]; then
            echo "✅ **Set up Go** - Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.setup_go.outcome }}" == "failure" ]; then
            echo "❌ **Set up Go** - Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Set up Go** - ${{ steps.setup_go.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Configure Git status
          if [ "${{ steps.configure_git.outcome }}" == "success" ]; then
            echo "✅ **Configure Git** - Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.configure_git.outcome }}" == "failure" ]; then
            echo "❌ **Configure Git** - Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Configure Git** - ${{ steps.configure_git.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Cache modules status
          if [ "${{ steps.cache_modules.outcome }}" == "success" ]; then
            echo "✅ **Cache Go Modules** - Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.cache_modules.outcome }}" == "failure" ]; then
            echo "❌ **Cache Go Modules** - Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Cache Go Modules** - ${{ steps.cache_modules.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Install dependencies status
          if [ "${{ steps.install_deps.outcome }}" == "success" ]; then
            echo "✅ **Install Dependencies** - Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.install_deps.outcome }}" == "failure" ]; then
            echo "❌ **Install Dependencies** - Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Install Dependencies** - ${{ steps.install_deps.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Install systemd status
          if [ "${{ steps.install_systemd.outcome }}" == "success" ]; then
            echo "✅ **Install Systemd Headers** - Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.install_systemd.outcome }}" == "failure" ]; then
            echo "❌ **Install Systemd Headers** - Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Install Systemd Headers** - ${{ steps.install_systemd.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Build status
          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "✅ **Build Application** - Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.build.outcome }}" == "failure" ]; then
            echo "❌ **Build Application** - Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Build Application** - ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Archive status
          if [ "${{ steps.archive.outcome }}" == "success" ]; then
            echo "✅ **Archive Artifacts** - Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.archive.outcome }}" == "failure" ]; then
            echo "❌ **Archive Artifacts** - Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Archive Artifacts** - ${{ steps.archive.outcome }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Overall Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Determine overall status
          if [ "${{ steps.checkout.outcome }}" == "success" ] && \
             [ "${{ steps.setup_go.outcome }}" == "success" ] && \
             [ "${{ steps.configure_git.outcome }}" == "success" ] && \
             [ "${{ steps.cache_modules.outcome }}" == "success" ] && \
             [ "${{ steps.install_deps.outcome }}" == "success" ] && \
             [ "${{ steps.install_systemd.outcome }}" == "success" ] && \
             [ "${{ steps.build.outcome }}" == "success" ] && \
             [ "${{ steps.archive.outcome }}" == "success" ]; then
            echo "🎉 **All checks passed!** Ready to merge." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some checks failed or were skipped.** Please review the job logs above." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${{ github.head_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Go Version**: \`${{ env.GO_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Binary Name**: \`${{ env.BINARY_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          
          # Exit with failure if any step failed
          if [ "${{ steps.checkout.outcome }}" != "success" ] || \
             [ "${{ steps.setup_go.outcome }}" != "success" ] || \
             [ "${{ steps.configure_git.outcome }}" != "success" ] || \
             [ "${{ steps.cache_modules.outcome }}" != "success" ] || \
             [ "${{ steps.install_deps.outcome }}" != "success" ] || \
             [ "${{ steps.install_systemd.outcome }}" != "success" ] || \
             [ "${{ steps.build.outcome }}" != "success" ] || \
             [ "${{ steps.archive.outcome }}" != "success" ]; then
            echo "❌ CI Pipeline failed. One or more checks did not pass."
            exit 1
          fi
          
          echo "✅ All CI checks passed successfully."