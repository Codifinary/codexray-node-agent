name: CD - Develop Branch (Commit Tag)

# -------------------------------------
# Triggers: Run on push to develop branch or after CI workflow completes
# -------------------------------------
on:
  push:
    branches:
      - develop
  workflow_run:
    workflows: ["CI - Build, Test, Lint"]
    types:
      - completed
    branches:
      - develop
  workflow_dispatch:

# -------------------------------------
# Environment Variables (from GitHub Settings → Secrets and variables → Actions → Variables)
# Required vars: GO_VERSION, BINARY_NAME
# -------------------------------------
env:
  GO_VERSION: ${{ vars.GO_VERSION }}
  BINARY_NAME: ${{ vars.BINARY_NAME }}

permissions:
  contents: read # Required for checking out the repository
  packages: write # Required for pushing Docker images to GHCR
  actions: read # Required for checking workflow runs
  statuses: read # Required for checking CI status

# -------------------------------------
# Jobs
# -------------------------------------
jobs:
  build-and-push:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # Set commit tag
      - name: Set commit tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "GHCR_REGISTRY=ghcr.io/${GITHUB_REPOSITORY,,}-dev" >> $GITHUB_ENV
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV
          echo "BINARY_TAG=${SHORT_SHA}" >> $GITHUB_ENV
          echo "VERSION=${SHORT_SHA}" >> $GITHUB_ENV

      # Log in to GHCR
      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ env.GO_VERSION }}

      # Configure Git for private repositories
      - name: Configure Git for private modules
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GHCR_PAT}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git config --global url."https://x-access-token:${GHCR_PAT}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/${{ github.repository_owner }}/*
          go env -w GONOPROXY=github.com/${{ github.repository_owner }}/*
          go env -w GONOSUMDB=github.com/${{ github.repository_owner }}/*

      # Cache Go modules to speed up the build process
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Install Go dependencies
      - name: Install dependencies
        run: go mod download

      # Install systemd development headers
      - name: Install systemd development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev

      # Build the codexray-node-agent Binary (without GPU)
      - name: Build ${{ env.BINARY_NAME }} Binary (without GPU)
        run: |
          GOARCH=amd64 GOOS=linux CGO_ENABLED=1 go build -mod=readonly -ldflags "-X main.version=${{ env.VERSION }}" -o ${{ env.BINARY_NAME }} .
          ls -la ${{ env.BINARY_NAME }}

      # Build the codexray-node-agent Binary (with GPU)
      - name: Build ${{ env.BINARY_NAME }} Binary (with GPU)
        run: |
          GOARCH=amd64 GOOS=linux CGO_ENABLED=1 go build -mod=readonly -tags gpu -ldflags "-X main.version=${{ env.VERSION }}" -o ${{ env.BINARY_NAME }}-gpu .
          ls -la ${{ env.BINARY_NAME }}-gpu

      # Build Docker Image (without GPU)
      - name: Build Docker Image (without GPU)
        run: |
          docker build --build-arg GHCR_PAT="${{ secrets.GHCR_PAT }}" --build-arg VERSION="${{ env.VERSION }}" \
            -t ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG }} \
            -f Dockerfile .

      # Build Docker Image (with GPU)
      - name: Build Docker Image (with GPU)
        run: |
          docker build --build-arg GHCR_PAT="${{ secrets.GHCR_PAT }}" --build-arg VERSION="${{ env.VERSION }}" --build-arg BUILD_GPU=true \
            -t ${{ env.GHCR_REGISTRY }}-gpu:${{ env.IMAGE_TAG }} \
            -f Dockerfile .

      # Push Docker Images to GHCR
      - name: Push Docker Images to GHCR
        run: |
          docker push ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.GHCR_REGISTRY }}-gpu:${{ env.IMAGE_TAG }}

      # Archive binaries with commit tag
      - name: Archive binary (without GPU) with commit tag
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.BINARY_TAG }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 30

      - name: Archive binary (with GPU) with commit tag
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-gpu-${{ env.BINARY_TAG }}
          path: ${{ env.BINARY_NAME }}-gpu
          retention-days: 30