name: CD - Develop Branch (Commit Tag)

# -------------------------------------
# Triggers: Run on push to develop branch
# -------------------------------------
on:
  push:
    branches:
      - develop

# -------------------------------------
# Environment Variables (from GitHub Settings → Secrets and variables → Actions → Variables)
# Required vars: GO_VERSION, BINARY_NAME
# -------------------------------------
env:
  GO_VERSION: ${{ vars.GO_VERSION }}
  BINARY_NAME: ${{ vars.BINARY_NAME }}

permissions:
  contents: read # Required for checking out the repository
  packages: write # Required for pushing Docker images to GHCR
  checks: read # Required for reading CI status
  actions: read # Required for reading workflow runs
  statuses: read # Required for reading commit statuses

# -------------------------------------
# Jobs
# -------------------------------------
jobs:
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    
    outputs:
      commit_sha: ${{ steps.sha.outputs.short }}
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.sha }}
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Get Commit SHA
        id: sha
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "short=$SHA" >> $GITHUB_OUTPUT
          echo "Full SHA: $(git rev-parse HEAD)"
          echo "Short SHA: $SHA"
      
      - name: Check CI Status
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Checking CI status for commit: ${COMMIT_SHA}"
          
          # Find PRs associated with this commit
          echo "Finding PR associated with commit ${COMMIT_SHA}..."
          
          PRS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls")
          
          PR_NUMBER=$(echo "$PRS" | jq -r '.[0].number // empty')
          
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "⚠️  No PR found for commit ${COMMIT_SHA}. This might be a direct push."
            echo "Checking CI workflow runs on develop branch instead..."
            
            # Get CI workflow runs for develop branch
            CI_RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ci.yaml/runs?branch=develop&status=completed&per_page=5")
            
            CI_CONCLUSION=$(echo "$CI_RUNS" | jq -r '.workflow_runs[0].conclusion // empty')
            
            if [ "$CI_CONCLUSION" == "success" ]; then
              echo "✅ Found recent successful CI run on develop branch. Proceeding with deployment."
              echo "should_deploy=true" >> $GITHUB_OUTPUT
            else
              echo "❌ No successful CI run found for develop branch. Skipping deployment."
              echo "Please ensure CI passes before pushing to develop."
              echo "should_deploy=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          else
            echo "Found PR #${PR_NUMBER}. Checking CI status for this PR..."
            
            # Get PR details
            PR_DETAILS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}")
            
            TARGET_BRANCH=$(echo "$PR_DETAILS" | jq -r '.base.ref // empty')
            PR_HEAD_SHA=$(echo "$PR_DETAILS" | jq -r '.head.sha // empty')
            
            echo "PR #${PR_NUMBER} targets ${TARGET_BRANCH}, head SHA: ${PR_HEAD_SHA}"
            
            # Get CI workflow runs for the PR head branch
            echo "Checking CI status for PR head SHA: ${PR_HEAD_SHA}"
            
            CI_RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ci.yaml/runs?head_sha=${PR_HEAD_SHA}&per_page=1")
            
            CI_CONCLUSION=$(echo "$CI_RUNS" | jq -r '.workflow_runs[0].conclusion // empty')
            CI_STATUS_VAL=$(echo "$CI_RUNS" | jq -r '.workflow_runs[0].status // empty')
            
            if [ "$CI_CONCLUSION" == "success" ]; then
              echo "✅ CI passed for PR #${PR_NUMBER} (commit: ${PR_HEAD_SHA}). Proceeding with deployment."
              echo "should_deploy=true" >> $GITHUB_OUTPUT
            elif [ "$CI_CONCLUSION" == "failure" ] || [ "$CI_CONCLUSION" == "cancelled" ]; then
              echo "❌ CI failed for PR #${PR_NUMBER} (conclusion: ${CI_CONCLUSION}). Skipping deployment."
              echo "Please ensure CI passes before merging to develop."
              echo "should_deploy=false" >> $GITHUB_OUTPUT
              exit 1
            elif [ "$CI_STATUS_VAL" == "in_progress" ] || [ "$CI_STATUS_VAL" == "queued" ]; then
              echo "⚠️  CI is still running for PR #${PR_NUMBER} (status: ${CI_STATUS_VAL})."
              echo "Skipping deployment. Please wait for CI to complete."
              echo "should_deploy=false" >> $GITHUB_OUTPUT
              exit 1
            else
              echo "⚠️  Could not determine CI status for PR #${PR_NUMBER}."
              echo "CI status: ${CI_STATUS_VAL}, conclusion: ${CI_CONCLUSION}"
              echo "Skipping deployment for safety."
              echo "should_deploy=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

  build-and-push:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should_deploy == 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Set commit tag
      - name: Set commit tag
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "GHCR_REGISTRY=ghcr.io/${GITHUB_REPOSITORY,,}-dev" >> $GITHUB_ENV
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV
          echo "BINARY_TAG=${SHORT_SHA}" >> $GITHUB_ENV
          echo "VERSION=${SHORT_SHA}" >> $GITHUB_ENV

      # Log in to GHCR
      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ env.GO_VERSION }}

      # Configure Git for private repositories
      - name: Configure Git for private modules
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GHCR_PAT}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git config --global url."https://x-access-token:${GHCR_PAT}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/${{ github.repository_owner }}/*
          go env -w GONOPROXY=github.com/${{ github.repository_owner }}/*
          go env -w GONOSUMDB=github.com/${{ github.repository_owner }}/*

      # Cache Go modules to speed up the build process
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Install Go dependencies
      - name: Install dependencies
        run: go mod download

      # Install systemd development headers
      - name: Install systemd development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev

      # Build the codexray-node-agent Binary
      - name: Build ${{ env.BINARY_NAME }} Binary
        run: |
          GOARCH=amd64 GOOS=linux CGO_ENABLED=1 go build -mod=readonly -ldflags "-X main.version=${{ env.VERSION }}" -o ${{ env.BINARY_NAME }} .
          ls -la ${{ env.BINARY_NAME }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build --build-arg GHCR_PAT="${{ secrets.GHCR_PAT }}" --build-arg VERSION="${{ env.VERSION }}" \
            -t ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG }} \
            -f Dockerfile .

      # Push Docker Image to GHCR
      - name: Push Docker Image to GHCR
        run: |
          docker push ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG }}

      # Archive binary with commit tag
      - name: Archive binary with commit tag
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.BINARY_TAG }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 30
