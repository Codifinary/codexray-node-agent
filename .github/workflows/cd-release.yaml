name: CD - Release (Main Branch)

# -------------------------------------
# Triggers: Manual workflow dispatch with version input
# Run this workflow manually after pushing to main branch
# -------------------------------------
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0 or v1.0.0)'
        required: true
        type: string

# -------------------------------------
# Environment Variables (from GitHub Settings → Secrets and variables → Actions → Variables)
# Required vars: GO_VERSION, BINARY_NAME
# -------------------------------------
env:
  GO_VERSION: ${{ vars.GO_VERSION }}
  BINARY_NAME: ${{ vars.BINARY_NAME }}

permissions:
  contents: write # Required for checking out repository and creating releases
  packages: write # Required for pushing Docker images to GHCR
  actions: read # Required for reading workflow runs
  statuses: read # Required for reading commit statuses

# -------------------------------------
# Jobs
# -------------------------------------
jobs:
  build-and-push:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main # Always use main branch for releases

      # Set version and tags
      - name: Set version and tags
        run: |
          # Get version from input and convert to lowercase
          VERSION_INPUT=$(echo "${{ github.event.inputs.version }}" | tr '[:upper:]' '[:lower:]')
          
          # Check if 'v' prefix exists and remove it
          if [[ $VERSION_INPUT == v* ]]; then
            VERSION=${VERSION_INPUT#v}
          else
            VERSION=$VERSION_INPUT
          fi
          
          # Create tag with lowercase 'v' prefix
          TAG_NAME="v${VERSION}"
          
          # Get commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          
          echo "GHCR_REGISTRY=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "COMMIT_SHA=${FULL_SHA}" >> $GITHUB_ENV
          
          # Image and binary tags: both version and commit SHA
          echo "IMAGE_TAG_VERSION=${TAG_NAME}" >> $GITHUB_ENV
          echo "IMAGE_TAG_COMMIT=${SHORT_SHA}" >> $GITHUB_ENV
          echo "BINARY_TAG_VERSION=${TAG_NAME}" >> $GITHUB_ENV
          echo "BINARY_TAG_COMMIT=${SHORT_SHA}" >> $GITHUB_ENV

      # Log in to GHCR
      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Cache Go modules to speed up the build process
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Install Go dependencies
      - name: Install dependencies
        run: go mod download

      # Install systemd development headers
      - name: Install systemd development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev

      # Build the codexray-node-agent Binary (without GPU)
      - name: Build ${{ env.BINARY_NAME }} Binary (without GPU)
        run: |
          GOARCH=amd64 GOOS=linux CGO_ENABLED=1 go build -mod=readonly -ldflags "-X main.version=${{ env.VERSION }}" -o ${{ env.BINARY_NAME }} .
          ls -la ${{ env.BINARY_NAME }}

      # Build the codexray-node-agent Binary (with GPU)
      - name: Build ${{ env.BINARY_NAME }} Binary (with GPU)
        run: |
          GOARCH=amd64 GOOS=linux CGO_ENABLED=1 go build -mod=readonly -tags gpu -ldflags "-X main.version=${{ env.VERSION }}" -o ${{ env.BINARY_NAME }}-gpu .
          ls -la ${{ env.BINARY_NAME }}-gpu

      # Build Docker Image (without GPU) with both version and commit tags
      - name: Build Docker Image (without GPU)
        run: |
          docker build --build-arg VERSION="${{ env.VERSION }}" \
            -t ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG_VERSION }} \
            -t ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG_COMMIT }} \
            -t ${{ env.GHCR_REGISTRY }}:latest \
            -f Dockerfile .

      # Build Docker Image (with GPU) with both version and commit tags
      - name: Build Docker Image (with GPU)
        run: |
          docker build --build-arg VERSION="${{ env.VERSION }}" --build-arg BUILD_GPU=true \
            -t ${{ env.GHCR_REGISTRY }}-gpu:${{ env.IMAGE_TAG_VERSION }} \
            -t ${{ env.GHCR_REGISTRY }}-gpu:${{ env.IMAGE_TAG_COMMIT }} \
            -t ${{ env.GHCR_REGISTRY }}-gpu:latest \
            -f Dockerfile .

      # Push Docker Images to GHCR
      - name: Push Docker Images to GHCR
        run: |
          docker push ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG_VERSION }}
          docker push ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG_COMMIT }}
          docker push ${{ env.GHCR_REGISTRY }}:latest
          docker push ${{ env.GHCR_REGISTRY }}-gpu:${{ env.IMAGE_TAG_VERSION }}
          docker push ${{ env.GHCR_REGISTRY }}-gpu:${{ env.IMAGE_TAG_COMMIT }}
          docker push ${{ env.GHCR_REGISTRY }}-gpu:latest

      # Create GitHub Release with release notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          body: |
            Release ${{ env.TAG_NAME }}
            
            **Version:** ${{ env.VERSION }}
            **Commit:** ${{ env.COMMIT_SHA }} (${{ env.SHORT_SHA }})
            
            ## Docker Images (without GPU)
            - `${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG_VERSION }}`
            - `${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG_COMMIT }}`
            - `${{ env.GHCR_REGISTRY }}:latest`
            
            ## Docker Images (with GPU)
            - `${{ env.GHCR_REGISTRY }}-gpu:${{ env.IMAGE_TAG_VERSION }}`
            - `${{ env.GHCR_REGISTRY }}-gpu:${{ env.IMAGE_TAG_COMMIT }}`
            - `${{ env.GHCR_REGISTRY }}-gpu:latest`
          files: |
            ${{ env.BINARY_NAME }}
            ${{ env.BINARY_NAME }}-gpu
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # Archive binaries with both version and commit tags
      - name: Archive binary (without GPU) with version tag
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.BINARY_TAG_VERSION }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 30

      - name: Archive binary (without GPU) with commit tag
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.BINARY_TAG_COMMIT }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 30

      - name: Archive binary (with GPU) with version tag
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-gpu-${{ env.BINARY_TAG_VERSION }}
          path: ${{ env.BINARY_NAME }}-gpu
          retention-days: 30

      - name: Archive binary (with GPU) with commit tag
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-gpu-${{ env.BINARY_TAG_COMMIT }}
          path: ${{ env.BINARY_NAME }}-gpu
          retention-days: 30