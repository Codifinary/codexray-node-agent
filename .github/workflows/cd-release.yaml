name: CD - Release (Main Branch)

# -------------------------------------
# Triggers: Manual workflow dispatch with version input
# Run this workflow manually after pushing to main branch
# -------------------------------------
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0 or v1.0.0)'
        required: true
        type: string

# -------------------------------------
# Environment Variables (from GitHub Settings → Secrets and variables → Actions → Variables)
# Required vars: GO_VERSION, BINARY_NAME
# -------------------------------------
env:
  GO_VERSION: ${{ vars.GO_VERSION }}
  BINARY_NAME: ${{ vars.BINARY_NAME }}

permissions:
  contents: read # Required for checking out the repository
  packages: write # Required for pushing Docker images to GHCR
  contents: write # Required for creating releases
  checks: read # Required for reading CI status
  actions: read # Required for reading workflow runs
  statuses: read # Required for reading commit statuses

# -------------------------------------
# Jobs
# -------------------------------------
jobs:
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    
    outputs:
      commit_sha: ${{ steps.sha.outputs.short }}
      full_sha: ${{ steps.sha.outputs.full }}
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main # Always use main branch for releases
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Get Commit SHA
        id: sha
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "full=$SHA" >> $GITHUB_OUTPUT
          echo "Full SHA: $SHA"
          echo "Short SHA: $SHORT_SHA"
      
      - name: Check CI Status
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Checking CI status for commit: ${COMMIT_SHA} on main branch"
          
          # Find PRs associated with this commit
          echo "Finding PR associated with commit ${COMMIT_SHA}..."
          
          PRS=$(curl -s -w "\n%{http_code}" -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls")
          
          HTTP_CODE=$(echo "$PRS" | tail -n1)
          PRS_BODY=$(echo "$PRS" | sed '$d')
          
          # Check if response is an array and extract PR number
          if echo "$PRS_BODY" | jq -e 'type == "array" and length > 0' > /dev/null 2>&1; then
            PR_NUMBER=$(echo "$PRS_BODY" | jq -r '.[0].number // empty')
            echo "Found PR #${PR_NUMBER}"
          else
            PR_NUMBER=""
            if [ "$HTTP_CODE" != "200" ]; then
              echo "⚠️  API returned HTTP ${HTTP_CODE}. Response: ${PRS_BODY}"
            fi
          fi
          
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "⚠️  No PR found for commit ${COMMIT_SHA}. This might be a direct push."
            echo "Checking CI workflow runs on main branch instead..."
            
            # Get CI workflow runs for main branch
            CI_RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ci.yaml/runs?branch=main&status=completed&per_page=5")
            
            CI_CONCLUSION=$(echo "$CI_RUNS" | jq -r '.workflow_runs[0].conclusion // empty')
            CI_HEAD_SHA=$(echo "$CI_RUNS" | jq -r '.workflow_runs[0].head_sha // empty')
            
            if [ "$CI_CONCLUSION" == "success" ]; then
              echo "✅ Found recent successful CI run on main branch (commit: ${CI_HEAD_SHA})."
              if [ "$CI_HEAD_SHA" == "$COMMIT_SHA" ]; then
                echo "CI run matches current commit. Proceeding with deployment."
              else
                echo "⚠️  CI run is for commit ${CI_HEAD_SHA}, current commit is ${COMMIT_SHA}."
                echo "Proceeding with deployment based on recent successful CI."
              fi
              echo "should_deploy=true" >> $GITHUB_OUTPUT
            else
              echo "❌ No successful CI run found for main branch. Skipping deployment."
              echo "Please ensure CI passes before creating a release."
              echo "should_deploy=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          else
            echo "Found PR #${PR_NUMBER}. Checking CI status for this PR..."
            
            # Get PR details
            PR_DETAILS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}")
            
            TARGET_BRANCH=$(echo "$PR_DETAILS" | jq -r '.base.ref // empty')
            PR_HEAD_SHA=$(echo "$PR_DETAILS" | jq -r '.head.sha // empty')
            
            echo "PR #${PR_NUMBER} targets ${TARGET_BRANCH}, head SHA: ${PR_HEAD_SHA}"
            
            if [ "$TARGET_BRANCH" != "main" ]; then
              echo "⚠️  PR targets ${TARGET_BRANCH}, but we're releasing from main."
              echo "Checking CI workflow runs on main branch instead..."
              
              # Fallback to checking main branch CI runs
              CI_RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ci.yaml/runs?branch=main&status=completed&per_page=1")
              
              CI_CONCLUSION=$(echo "$CI_RUNS" | jq -r '.workflow_runs[0].conclusion // empty')
              
              if [ "$CI_CONCLUSION" == "success" ]; then
                echo "✅ Found recent successful CI run on main branch. Proceeding with deployment."
                echo "should_deploy=true" >> $GITHUB_OUTPUT
              else
                echo "❌ No successful CI run found for main branch. Skipping deployment."
                echo "should_deploy=false" >> $GITHUB_OUTPUT
                exit 1
              fi
            else
              # Get CI workflow runs for the PR head branch
              echo "Checking CI status for PR head SHA: ${PR_HEAD_SHA}"
              
              CI_RUNS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ci.yaml/runs?head_sha=${PR_HEAD_SHA}&per_page=1")
              
              CI_CONCLUSION=$(echo "$CI_RUNS" | jq -r '.workflow_runs[0].conclusion // empty')
              CI_STATUS_VAL=$(echo "$CI_RUNS" | jq -r '.workflow_runs[0].status // empty')
              
              if [ "$CI_CONCLUSION" == "success" ]; then
                echo "✅ CI passed for PR #${PR_NUMBER} (commit: ${PR_HEAD_SHA}). Proceeding with deployment."
                echo "should_deploy=true" >> $GITHUB_OUTPUT
              elif [ "$CI_CONCLUSION" == "failure" ] || [ "$CI_CONCLUSION" == "cancelled" ]; then
                echo "❌ CI failed for PR #${PR_NUMBER} (conclusion: ${CI_CONCLUSION}). Skipping deployment."
                echo "Please ensure CI passes before merging to main."
                echo "should_deploy=false" >> $GITHUB_OUTPUT
                exit 1
              elif [ "$CI_STATUS_VAL" == "in_progress" ] || [ "$CI_STATUS_VAL" == "queued" ]; then
                echo "⚠️  CI is still running for PR #${PR_NUMBER} (status: ${CI_STATUS_VAL})."
                echo "Skipping deployment. Please wait for CI to complete."
                echo "should_deploy=false" >> $GITHUB_OUTPUT
                exit 1
              else
                echo "⚠️  Could not determine CI status for PR #${PR_NUMBER}."
                echo "CI status: ${CI_STATUS_VAL}, conclusion: ${CI_CONCLUSION}"
                echo "Skipping deployment for safety."
                echo "should_deploy=false" >> $GITHUB_OUTPUT
                exit 1
              fi
            fi
          fi

  build-and-push:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should_deploy == 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main # Always use main branch for releases

      # Set version and tags
      - name: Set version and tags
        run: |
          # Get version from input
          VERSION_INPUT="${{ github.event.inputs.version }}"
          
          # Remove 'v' prefix if present
          VERSION=${VERSION_INPUT#v}
          TAG_NAME="v${VERSION}"
          
          # Get commit SHA from check-ci job
          SHORT_SHA="${{ needs.check-ci.outputs.commit_sha }}"
          FULL_SHA="${{ needs.check-ci.outputs.full_sha }}"
          
          echo "GHCR_REGISTRY=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "COMMIT_SHA=${FULL_SHA}" >> $GITHUB_ENV
          
          # Image and binary tags: both version and commit SHA
          echo "IMAGE_TAG_VERSION=${TAG_NAME}" >> $GITHUB_ENV
          echo "IMAGE_TAG_COMMIT=${SHORT_SHA}" >> $GITHUB_ENV
          echo "BINARY_TAG_VERSION=${TAG_NAME}" >> $GITHUB_ENV
          echo "BINARY_TAG_COMMIT=${SHORT_SHA}" >> $GITHUB_ENV

      # Log in to GHCR
      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ env.GO_VERSION }}

      # Configure Git for private repositories
      - name: Configure Git for private modules
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GHCR_PAT}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git config --global url."https://x-access-token:${GHCR_PAT}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/${{ github.repository_owner }}/*
          go env -w GONOPROXY=github.com/${{ github.repository_owner }}/*
          go env -w GONOSUMDB=github.com/${{ github.repository_owner }}/*

      # Cache Go modules to speed up the build process
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Install Go dependencies
      - name: Install dependencies
        run: go mod download

      # Install systemd development headers
      - name: Install systemd development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev

      # Build the codexray-node-agent Binary
      - name: Build ${{ env.BINARY_NAME }} Binary
        run: |
          GOARCH=amd64 GOOS=linux CGO_ENABLED=1 go build -mod=readonly -ldflags "-X main.version=${{ env.VERSION }}" -o ${{ env.BINARY_NAME }} .
          ls -la ${{ env.BINARY_NAME }}

      # Build Docker Image with both version and commit tags
      - name: Build Docker Image
        run: |
          docker build --build-arg GHCR_PAT="${{ secrets.GHCR_PAT }}" --build-arg VERSION="${{ env.VERSION }}" \
            -t ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG_VERSION }} \
            -t ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG_COMMIT }} \
            -t ${{ env.GHCR_REGISTRY }}:latest \
            -f Dockerfile .

      # Push Docker Image to GHCR
      - name: Push Docker Image to GHCR
        run: |
          docker push ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG_VERSION }}
          docker push ${{ env.GHCR_REGISTRY }}:${{ env.IMAGE_TAG_COMMIT }}
          docker push ${{ env.GHCR_REGISTRY }}:latest

      # Create GitHub Release
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.TAG_NAME }}
          release_name: Release ${{ env.TAG_NAME }}
          body: |
            Release ${{ env.TAG_NAME }}
            
            **Version:** ${{ env.VERSION }}
            **Commit:** ${{ env.COMMIT_SHA }} (${{ env.SHORT_SHA }})
          draft: false
          prerelease: false

      # Upload Binary as a Release Asset
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.BINARY_NAME }}
          asset_name: ${{ env.BINARY_NAME }}
          asset_content_type: application/octet-stream

      # Archive binary with both version and commit tags
      - name: Archive binary with version tag
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.BINARY_TAG_VERSION }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 30

      - name: Archive binary with commit tag
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.BINARY_TAG_COMMIT }}
          path: ${{ env.BINARY_NAME }}
          retention-days: 30
